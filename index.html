<!DOCTYPE html>
<html>
<head>
  <title>naruto.jpg</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      background-image: url("naruto.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      background: rgba(0, 0, 0, 0.5);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      color: white;
    }

    img {
      width: 300px;
      height: auto;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="content">
    <img src="foto.jpg" alt="Foto saya">
  </div>

</body>
</html>
