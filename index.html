<!DOCTYPE html>
<html>
<head>
  <title>naruto.jpg</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;

      /* background */
      background-image: url("naruto.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      height: 100vh;

      /* center content */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* overlay gelap biar teks jelas */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 2;

      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: white;
      max-width: 90%;
    }

    img {
      width: 100%;
      max-width: 300px;
      height: auto;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="overlay"></div>
    <!-- pastikan file foto.jpg ada di folder yang sama -->
    <img src="foto.jpg" alt="Foto saya">
  </div>

</body>
</html>
