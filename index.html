<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Background Naruto</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;

      background-image: url("naruto.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      background: rgba(0, 0, 0, 0.55);
      padding: 20px;
      border-radius: 12px;
    }

    .content img {
      width: 320px;
      height: auto;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>

<body>

  <div class="content">
    <!-- pakai gambar kamu (yang kamu upload) -->
    <img src="image(11).png">
  </div>

</body>
</html>
