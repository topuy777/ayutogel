<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Naruto</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-image: url("naruto.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
    }

    img {
      width: 320px;
      height: auto;
      border-radius: 12px;

      /* posisi di tengah */
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

  <img src="image(11).png">

</body>
</html>
